name: YouTube Live M3U8 Generator - ULTRA DIAGNOSTIC
run-name: Testing basics 🩺

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test 1 - Check if secret exists
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "✅ Secret exists and has content"
            echo "First 50 characters: ${COOKIES:0:50}"
          else
            echo "❌ Secret is empty or doesn't exist"
            exit 1
          fi

      - name: Test 2 - Create test file
        run: |
          echo "This is a test file" > test.txt
          echo "✅ Test file created"
          ls -la test.txt

      - name: Test 3 - Try creating cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          echo "$COOKIES" > cookies.txt
          echo "✅ cookies.txt created"
          echo "File size: $(wc -l < cookies.txt) lines"
          echo "First line:"
          head -1 cookies.txt
