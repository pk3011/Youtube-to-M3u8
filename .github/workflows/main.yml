name: YouTube Live M3U8 Generator
run-name: Generate HD Playlist 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python & yt-dlp
        run: |
          pip install --upgrade pip yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Install Deno (JavaScript Runtime)
        run: |
          echo "📦 Installing Deno..."
          curl -fsSL https://deno.land/install.sh | sh
          echo "/home/runner/.deno/bin" >> $GITHUB_PATH
          export PATH="/home/runner/.deno/bin:$PATH"
          echo "✅ Deno version: $(deno --version | head -1)"

      - name: Setup Cloudflare WARP
        continue-on-error: true
        run: |
          echo "🌐 Setting up Cloudflare WARP..."
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iptables
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          
          wgcf register --accept-tos
          wgcf generate
          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf
          sudo wg-quick up /etc/wireguard/wgcf.conf || true
          
          echo "✅ WARP setup complete"

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "❌ COOKIES_TXT secret is required"
            exit 1
          fi
          echo "$COOKIES" > cookies.txt
          echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"

      - name: Generate HD playlist
        run: |
          cat > generate.py << 'PYTHON_EOF'
          import yt_dlp
          import time
          import random
          import re
          import os
          import sys
          from datetime import datetime, timezone

          PROXY_BASE = "https://siteproxy.chidex4k43342.workers.dev/yourtube/"

          def get_stream_url(url, cookies_file):
              """Get the best quality stream URL (prioritizes 1080p/720p over 480p)"""
              ydl_opts = {
                  'cookies': cookies_file,
                  'quiet': True,
                  'no_warnings': True,
                  'socket_timeout': 20,
              }
              
              try:
                  with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                      info = ydl.extract_info(url, download=False)
                      
                      if not info:
                          return None, None
                      
                      video_id = info.get('id')
                      title = info.get('title', 'Unknown')
                      
                      # Check if live
                      is_live = info.get('is_live', False)
                      live_status = info.get('live_status', '')
                      
                      if not (is_live or live_status == 'is_live'):
                          print(f"  ⚠️ Not currently live")
                          return None, video_id
                      
                      formats = info.get('formats', [])
                      
                      # Priority 1: Format 301 (1080p60) - best quality
                      for fmt in formats:
                          if fmt.get('format_id') == '301' and fmt.get('url'):
                              height = fmt.get('height', '1080')
                              fps = fmt.get('fps', '60')
                              print(f"  ✅ 1080p{fmt.get('fps', '')} stream found!")
                              return fmt['url'], video_id
                      
                      # Priority 2: Format 300 (720p60) - good quality
                      for fmt in formats:
                          if fmt.get('format_id') == '300' and fmt.get('url'):
                              print(f"  ✅ 720p60 stream found!")
                              return fmt['url'], video_id
                      
                      # Priority 3: Format 94 (480p) - fallback
                      for fmt in formats:
                          if fmt.get('format_id') == '94' and fmt.get('url'):
                              print(f"  ⚠️ Only 480p available")
                              return fmt['url'], video_id
                      
                      # Priority 4: Any m3u8 format
                      for fmt in formats:
                          protocol = fmt.get('protocol', '')
                          if protocol in ['m3u8', 'm3u8_native'] and fmt.get('url'):
                              height = fmt.get('height', 'unknown')
                              print(f"  ✅ Found {height}p stream")
                              return fmt['url'], video_id
                      
                      return None, video_id
                          
              except Exception as e:
                  print(f"  ⚠️ Error: {str(e)[:100]}")
                  return None, None

          # Read streams.txt
          if not os.path.exists('streams.txt'):
              print("❌ streams.txt not found")
              sys.exit(0)

          with open('streams.txt', 'r') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          if not lines:
              print("⚠️ No streams found")
              sys.exit(0)

          # Create playlist header
          m3u8 = [
              "#EXTM3U",
              f"# Generated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}",
              f"# Total channels: {len(lines)}",
              ""
          ]

          active = 0
          quality_stats = {"1080p": 0, "720p": 0, "480p": 0, "other": 0}

          for i, line in enumerate(lines, 1):
              print(f"\n📺 [{i}/{len(lines)}] Processing: {line}")
              
              # Small delay between requests
              time.sleep(random.randint(5, 10))
              
              stream_url, video_id = get_stream_url(line, 'cookies.txt')
              
              # Extract channel name from URL
              name_match = re.search(r'@([^/]+)', line)
              channel_name = name_match.group(1) if name_match else f"Channel{i}"
              
              if stream_url:
                  active += 1
                  
                  # Try to determine quality for stats
                  if '301' in stream_url or '1080' in stream_url:
                      quality_stats["1080p"] += 1
                      quality_tag = "1080p"
                  elif '300' in stream_url or '720' in stream_url:
                      quality_stats["720p"] += 1
                      quality_tag = "720p"
                  elif '94' in stream_url or '480' in stream_url:
                      quality_stats["480p"] += 1
                      quality_tag = "480p"
                  else:
                      quality_stats["other"] += 1
                      quality_tag = "HD"
                  
                  print(f"  ✅ SUCCESS: {quality_tag} stream")
                  m3u8.append(f'#EXTINF:-1 tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} (Live - {quality_tag})')
                  m3u8.append(stream_url)
                  m3u8.append("")
              elif video_id:
                  print(f"  ⚠️ Using proxied YouTube page")
                  proxied_url = PROXY_BASE + f"https://www.youtube.com/watch?v={video_id}"
                  m3u8.append(f'#EXTINF:-1 tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} (Live - Proxy)')
                  m3u8.append(proxied_url)
                  m3u8.append("")
              else:
                  print(f"  ❌ Failed - using original URL")
                  m3u8.append(f'#EXTINF:-1 tvg-name="{channel_name}" group-title="YouTube Live",{channel_name} (YouTube)')
                  m3u8.append(line)
                  m3u8.append("")

          # Add summary with quality stats
          m3u8.extend([
              "",
              f"# Summary: {active}/{len(lines)} streams active",
              f"# Quality: {quality_stats['1080p']}x1080p, {quality_stats['720p']}x720p, {quality_stats['480p']}x480p",
              f"# Updated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}"
          ])

          with open('streams.m3u8', 'w') as f:
              f.write('\n'.join(m3u8))

          print(f"\n{'='*50}")
          print(f"📊 FINAL: {active}/{len(lines)} streams active")
          print(f"📊 Quality breakdown: 1080p:{quality_stats['1080p']} 720p:{quality_stats['720p']} 480p:{quality_stats['480p']}")
          print(f"{'='*50}")

          PYTHON_EOF

          python generate.py

      - name: Fix git conflicts
        run: |
          sed -i '/^<<<<<<< /d' streams.m3u8 2>/dev/null || true
          sed -i '/^=======/d' streams.m3u8 2>/dev/null || true
          sed -i '/^>>>>>>> /d' streams.m3u8 2>/dev/null || true
          awk '!seen[$0]++' streams.m3u8 > streams_clean.m3u8 2>/dev/null || true
          mv streams_clean.m3u8 streams.m3u8 2>/dev/null || true

      - name: Show playlist preview
        run: |
          echo ""
          echo "📄 Generated streams.m3u8:"
          echo "=========================="
          head -20 streams.m3u8
          echo "..."

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f streams.m3u8
          git commit -m "🔄 Update HD playlist [$(date -u +%H:%M)]" || true
          git push --force origin main
          echo "✅ Playlist updated"
